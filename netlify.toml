[build]
publish = "dist"
command = "pnpm run build"

[build.environment]
NODE_VERSION = "16"

# Cache headers for better performance
[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.otf"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.woff2"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/logos/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# HTML files - shorter cache but still cacheable
[[headers]]
for = "/*.html"

[headers.values]
Cache-Control = "public, max-age=3600, must-revalidate"

# Enable compression for all text files
[[headers]]
for = "/*"

[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
